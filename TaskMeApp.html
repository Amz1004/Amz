<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TaskMe - Optimized Todo App</title>
<style>
  /* Base styles */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; background: #1e2230; color: #e5e6f0; }
  body { display: flex; flex-direction: row; height: 100vh; overflow: hidden; } /* Forced horizontal row [cite: 1, 142] */

  /* Sync status */
  .sync-status { position: fixed; bottom: 10px; right: 10px; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 1000; transition: all 0.3s ease; } [cite: 1, 159]
  .sync-status.synced { background: #4ade80; color: #166534; }
  .sync-status.syncing { background: #fbbf24; color: #92400e; }
  .sync-status.offline { background: #ef4444; color: #991b1b; }

  /* Sidebar with Transitions [cite: 8, 163, 165] */
  #sidebar { 
    width: 320px; height: 100vh; background-color: #23263a; border-right: 2px solid #3e5c98; 
    padding: 20px; overflow-y: auto; flex-shrink: 0; transition: width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
    overflow-x: hidden; /* Prevents text wrap during shrink [cite: 166] */
  }
  #sidebar.collapsed { width: 0; padding: 0; border: none; opacity: 0; pointer-events: none; } [cite: 165]

  /* Toggle Button [cite: 164, 172] */
  .sidebar-toggle { background: #6c8fff; color: #181a25; border: none; border-radius: 8px; padding: 12px 16px; 
    cursor: pointer; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; z-index: 1001; }

  /* Main content [cite: 16, 170] */
  #mainContent { flex-grow: 1; overflow-y: auto; padding: 20px; background-color: #181a25; transition: padding 0.3s ease; }

  /* Forms and Inputs [cite: 12, 19] */
  input[type="text"], input[type="date"], select, textarea { 
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #434a63; background: #22263a; 
    color: #e5e6f0; font-size: 16px; /* 16px prevents mobile auto-zoom [cite: 151] */
  }
  #addTaskForm { max-width: 700px; margin: 0 auto 30px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; } [cite: 18]
  #addTaskForm textarea { resize: vertical; min-height: 50px; max-height: 150px; flex-grow: 1; } [cite: 20, 155]

  /* Task cards and Touch Targets [cite: 22, 148] */
  .task-card { background-color: #22263a; padding: 16px; border-radius: 10px; margin-bottom: 24px; box-shadow: 0 0 10px #4a5599aa; } [cite: 23]
  .action-btn-inline { font-size: 20px; width: 44px; height: 44px; /* Optimized touch target [cite: 148] */
    background: #3e5c98; color: #fff; border: none; border-radius: 6px; margin: 0 3px; cursor: pointer; 
    display: inline-flex; align-items: center; justify-content: center; } [cite: 27, 28]

  /* Dashboard [cite: 50, 152] */
  .dash-container { max-width: 700px; margin: 0 auto 30px; background: #23263a; border-radius: 14px; padding: 24px; border: 2px solid #394fa9; }
  .dashboard-items { display: flex; gap: 24px; justify-content: space-around; flex-wrap: wrap; } [cite: 51]

  /* Mobile Media Queries [cite: 144, 145] */
  @media (max-width: 768px) {
    body { flex-direction: column; overflow-y: auto; } [cite: 142]
    #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 2px solid #3e5c98; } [cite: 171]
    #sidebar.collapsed { display: none; }
    #addTaskForm { flex-direction: column; }
    .dashboard-item { min-width: 45%; flex-grow: 1; }
  }

  /* Color Categories */
  .category-workout { color: #ff8792; } .category-personal { color: #fdfd65; }
  .category-professional { color: #89ffd5; } .category-finance { color: #f6ca97; }

  /* Modal disclaimer  */
  .security-alert { background: #450a0a; color: #fecaca; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; border: 1px solid #991b1b; }
</style>
</head>
<body>
  <div id="syncStatus" class="sync-status offline">📱 Local</div>

  <div id="configModal" class="config-modal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7);">
    <div class="config-content" style="background:#23263a; margin:5% auto; padding:20px; border-radius:15px; width:90%; max-width:500px;">
      <div class="security-alert">
        <strong>⚠️ Security:</strong> Storing tokens in a browser is risky. Use a "Fine-grained" token with only Gist access. [cite: 110, 112]
      </div>
      <h3>GitHub Sync Config</h3>
      <input type="text" id="githubTokenInput" placeholder="GitHub PAT (gist scope)" style="margin-bottom:10px;">
      <input type="text" id="gistIDInput" placeholder="Gist ID (Optional)" style="margin-bottom:10px;">
      <button onclick="saveGistConfig()" style="background:#6c8fff; padding:10px; border:none; border-radius:8px; cursor:pointer;">Save & Reload</button>
      <button onclick="closeConfigModal()" style="background:#434a63; color:white; padding:10px; border:none; border-radius:8px; cursor:pointer;">Close</button>
    </div>
  </div>

  <aside id="sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>Filters</h2>
      <button onclick="openConfigModal()" style="background: #6c8fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">☁️ Sync</button>
    </div>
    <label><input type="checkbox" id="filterAllDates" checked> Show All Dates</label>
    <input type="date" id="filterDate" disabled style="margin: 10px 0;">
    <select id="filterCategory">
        <option value="">All Categories</option>
        <option value="workout">Workout</option>
        <option value="personal">Personal</option>
        <option value="professional">Professional</option>
        <option value="finance">Finance</option>
    </select>
  </aside>

  <main id="mainContent">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰ Filters</button> [cite: 167]
    <h1>TaskMe Todo App</h1>
    
    <form id="addTaskForm" onsubmit="event.preventDefault(); addTask();">
      <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
      <textarea id="taskDescription" placeholder="Description (optional)"></textarea>
      <select id="taskCategory" required>
        <option value="workout">Workout</option>
        <option value="personal">Personal</option>
        <option value="professional">Professional</option>
        <option value="finance">Finance</option>
      </select>
      <input type="date" id="taskDate" required>
      <button type="submit" style="background:#6c8fff; border:none; padding:12px 24px; border-radius:8px; cursor:pointer; font-weight:bold;">Add Task</button>
    </form>

    <div id="tasksGrouped"></div>

    <section class="dash-container">
      <h2>Progress Dashboard</h2>
      <div id="filterIndicator" style="text-align:center; color:#aab7db; font-style:italic; margin-bottom:15px;"></div>
      <div class="dashboard-items" id="dashboard"></div>
    </section>
  </main>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
  let githubToken = localStorage.getItem('githubToken') || "";
  let gistID = localStorage.getItem('gistID') || "";
  let currentFilter = { specificDate: null };

  // Improved HTML Escaping [cite: 129]
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("collapsed"); [cite: 163, 168]
  }

  async function syncToGist() {
    if (!githubToken || !gistID) return;
    updateSyncStatus("syncing");
    try {
      await fetch(`https://api.github.com/gists/${gistID}`, {
        method: "PATCH",
        headers: { Authorization: `token ${githubToken}`, "Content-Type": "application/json" },
        body: JSON.stringify({ files: { "tasks.json": { content: JSON.stringify(tasks) } } })
      });
      updateSyncStatus("synced");
    } catch (e) { updateSyncStatus("offline"); }
  }

  function addTask() {
    const task = {
      id: crypto.randomUUID(), // Modern secure ID generation 
      title: document.getElementById("taskTitle").value,
      description: document.getElementById("taskDescription").value,
      category: document.getElementById("taskCategory").value,
      dueDate: document.getElementById("taskDate").value,
      status: "pending",
      subtasks: []
    };
    tasks.push(task);
    saveTasks();
    renderAll();
    document.getElementById("addTaskForm").reset();
    document.getElementById("taskDate").value = new Date().toISOString().slice(0, 10);
  }

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    syncToGist();
  }

  function renderTasks() {
    const container = document.getElementById("tasksGrouped");
    container.innerHTML = "";
    
    // Simple filter logic for this demo
    const catFilter = document.getElementById("filterCategory").value;
    const filtered = tasks.filter(t => !catFilter || t.category === catFilter);

    if (filtered.length === 0) {
        container.innerHTML = "<p style='text-align:center; opacity:0.5;'>No tasks found.</p>";
        return;
    }

    filtered.forEach(task => {
      const card = document.createElement("div");
      card.className = "task-card";
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong class="${task.status === 'completed' ? 'category-' + task.category : ''}" style="font-size:1.1em;">${escapeHtml(task.title)}</strong>
            <div style="font-size:0.8em; opacity:0.6;">Due: ${task.dueDate}</div>
          </div>
          <div>
            <button class="action-btn-inline" onclick="toggleStatus('${task.id}')">✓</button>
            <button class="action-btn-inline" style="background:#eb7070;" onclick="deleteTask('${task.id}')">✕</button>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function toggleStatus(id) {
    tasks = tasks.map(t => t.id === id ? {...t, status: t.status === 'pending' ? 'completed' : 'pending'} : t);
    saveTasks();
    renderAll();
  }

  function deleteTask(id) {
    if(confirm("Delete task?")) {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderAll();
    }
  }

  function renderDashboard() {
    const dash = document.getElementById("dashboard");
    dash.innerHTML = "";
    const total = tasks.length;
    const completed = tasks.filter(t => t.status === 'completed').length;
    const percent = total ? Math.round((completed / total) * 100) : 0; [cite: 101]

    dash.innerHTML = `
        <div class="dashboard-item">
            <div style="font-size:2em; font-weight:bold; color:#6c8fff;">${percent}%</div>
            <div>Overall Progress</div>
        </div>
    `;
  }

  function renderAll() { renderTasks(); renderDashboard(); }
  function openConfigModal() { document.getElementById("configModal").style.display="block"; }
  function closeConfigModal() { document.getElementById("configModal").style.display="none"; }
  function saveGistConfig() {
    localStorage.setItem('githubToken', document.getElementById("githubTokenInput").value);
    localStorage.setItem('gistID', document.getElementById("gistIDInput").value);
    location.reload();
  }
  function updateSyncStatus(s) { document.getElementById("syncStatus").className = "sync-status " + s; }

  // Initial setup
  document.getElementById("taskDate").value = new Date().toISOString().slice(0, 10);
  document.getElementById("filterCategory").addEventListener("change", renderAll);
  renderAll();
</script>
</body>
</html>
